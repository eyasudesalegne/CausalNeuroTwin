name: Bug report
description: Report a reproducible software defect
title: "[BUG] "
labels: ["type:bug", "status:triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide commands, non-sensitive configuration, and complete logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, container, scheduler, CPU/GPU, and package versions.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This issue contains no credentials, private paths, or participant-level data.
          required: true
