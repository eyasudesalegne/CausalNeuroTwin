name: Apply Phase 03 payload

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'phase-03-public-dataset-registration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Phase 03 branch
        uses: actions/checkout@v4
        with:
          ref: phase-03-public-dataset-registration
          fetch-depth: 0

      - name: Apply verified multipart payload
        shell: bash
        run: |
          set -euo pipefail
          test -f .phase03_fixed.ready
          test -f .phase03_payload.part00
          test -f .phase03_fixed.part01
          cat .phase03_payload.part00 .phase03_fixed.part* > /tmp/phase03.zip.b64
          base64 --decode /tmp/phase03.zip.b64 > /tmp/phase03.zip
          echo "542dfa16e34f400bd76fcc51a617f440f5caff939761b3f6e6eb54c991b747bc  /tmp/phase03.zip" | sha256sum -c -
          rm -rf /tmp/phase03-unpack
          mkdir -p /tmp/phase03-unpack
          unzip -q /tmp/phase03.zip -d /tmp/phase03-unpack
          test -f /tmp/phase03-unpack/CausalNeuroTwin/pyproject.toml
          test -f /tmp/phase03-unpack/CausalNeuroTwin/PHASE_03_REPORT.md
          test -f /tmp/phase03-unpack/CausalNeuroTwin/src/causalneurotwin/datasets.py
          rsync -a --delete --exclude='.git/' /tmp/phase03-unpack/CausalNeuroTwin/ ./
          rm -f .phase03_fixed.part* .phase03_fixed.ready
          rm -f .phase03_payload.part* .phase03_payload.ready
          rm -f .github/workflows/apply-phase03-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: register OpenNeuro ds004024 for Phase 03"
          git push origin HEAD:phase-03-public-dataset-registration
