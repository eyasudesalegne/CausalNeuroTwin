name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify repository contents
        run: python scripts/verify_repository.py

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: mypy src scripts

      - name: Test with coverage
        run: pytest --cov=causalneurotwin --cov-report=term-missing --cov-report=xml

      - name: Foundation smoke check
        run: causalneurotwin doctor --json

      - name: Phase 02 run-contract check
        run: |
          causalneurotwin run-contract \
            --config configs/run_contract.example.yaml \
            --output-root .ci-runs \
            --run-id phase02-ci
          cd .ci-runs/phase02-ci
          sha256sum -c checksums.sha256

      - name: Create Phase 03 metadata-only fixture
        run: |
          python scripts/create_phase03_fixture.py \
            --output .ci-dataset-root/openneuro/ds004024-v1.0.1

      - name: Phase 03 dataset-registration check
        run: |
          causalneurotwin dataset validate \
            --registry configs/data/openneuro_ds004024.yaml \
            --dataset-root .ci-dataset-root/openneuro/ds004024-v1.0.1 \
            --output-dir .ci-dataset-report
          cd .ci-dataset-report
          sha256sum -c checksums.sha256

      - name: Build source and wheel distributions
        run: python -m build
