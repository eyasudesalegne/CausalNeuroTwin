name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify repository contents
        run: python scripts/verify_repository.py

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: mypy src scripts

      - name: Test with coverage
        run: pytest --cov=causalneurotwin --cov-report=term-missing --cov-report=xml

      - name: Foundation smoke check
        run: causalneurotwin doctor --json

      - name: Build source and wheel distributions
        run: python -m build
